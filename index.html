<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScholarHub — Chia sẻ tài liệu học tập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <link href="css/scholarhub.css" rel="stylesheet">
    <link rel="icon" href="logo.png" type="image/png">
</head>
<body data-page="home">
    <div id="app-header"></div>

    <div class="app-shell">
        <aside id="app-sidebar" class="app-sidebar"></aside>

        <main class="app-main">
            <div class="hero-carousel" id="hero-carousel">
                <div class="hero-slide">
                    <div>
                        <img src="logo.png" alt="ScholarHub" class="hero-logo mb-3" width="220" height="58">
                        <h2>Kho tài liệu ôn thi DNU</h2>
                        <p>Tìm đề thi, slide, ghi chép theo môn học &amp; năm học — miễn phí &amp; VIP bằng Xu.</p>
                        <a href="documents.html" class="btn btn-light btn-sm rounded-pill px-4">Khám phá ngay</a>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <div class="input-group shadow-sm" style="border-radius:12px;overflow:hidden">
                    <span class="input-group-text bg-white border-0"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
                    <input type="text" id="hero-search" class="form-control border-0" placeholder="Tìm đề thi, slide, ghi chép...">
                    <button class="btn btn-accent px-4" type="button" onclick="handleHeroSearch()">Tìm kiếm</button>
                </div>
            </div>

            <div class="section-header">
                <h2><span>✨</span> Tài liệu mới &amp; hot</h2>
                <a href="documents.html" class="view-all">Xem tất cả →</a>
            </div>
            <div id="featured-loader" class="row g-3 d-none"></div>
            <div id="featured-grid" class="row g-3"></div>

            <div class="section-header mt-4">
                <h2><span>👑</span> Tài liệu VIP (trả xu)</h2>
                <a href="documents.html?filter=premium" class="view-all">Xem tất cả →</a>
            </div>
            <div id="premium-grid" class="row g-3 mb-4"></div>

            <div class="section-header">
                <h2><span>📖</span> Môn học nổi bật</h2>
                <a href="subjects.html" class="view-all">Danh mục →</a>
            </div>
            <div id="subjects-row" class="row g-3"></div>
        </main>

        <aside id="app-rightbar" class="app-rightbar"></aside>
    </div>

    <div id="app-footer"></div>

    <div class="modal fade" id="docDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content" style="border-radius:16px">
                <div class="modal-header border-0"><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body pt-0" id="doc-detail-body"></div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/seed-data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/data-service.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/jquery-ui.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
