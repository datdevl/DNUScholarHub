<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yêu thích — ScholarHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <link href="css/scholarhub.css" rel="stylesheet">
    <link rel="icon" href="logo.png" type="image/png">
</head>
<body data-page="favorites">
    <div id="app-header"></div>
    <div class="app-shell">
        <aside id="app-sidebar" class="app-sidebar"></aside>
        <main class="app-main">
            <h1 class="h5 fw-bold mb-3"><i class="fa-solid fa-bookmark text-warning me-2"></i>Yêu thích</h1>
            <div id="favorites-empty" class="empty-state d-none">
                <p>Chưa có tài liệu yêu thích.</p>
                <a href="documents.html" class="btn btn-primary btn-sm">Khám phá</a>
            </div>
            <div id="favorites-loader" class="row g-3 d-none"></div>
            <div id="favorites-grid" class="row g-3"></div>
        </main>
        <aside id="app-rightbar" class="app-rightbar"></aside>
    </div>
    <div id="app-footer"></div>
    <div class="modal fade" id="docDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg"><div class="modal-content" style="border-radius:16px">
            <div class="modal-header border-0"><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body" id="doc-detail-body"></div>
        </div></div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/seed-data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/data-service.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/favorites.js"></script>
    <script>document.addEventListener("DOMContentLoaded",function(){initLayout("favorites");});</script>
</body>
</html>
