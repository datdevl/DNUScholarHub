<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho tài liệu — ScholarHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <link href="css/scholarhub.css" rel="stylesheet">
    <link rel="icon" href="logo.png" type="image/png">
</head>
<body data-page="documents">
    <div id="app-header"></div>
    <div class="app-shell">
        <aside id="app-sidebar" class="app-sidebar"></aside>
        <main class="app-main">
            <div class="page-header-bar rounded-3 mb-3 px-3 py-3 bg-white shadow-sm">
                <h1 class="h5 fw-bold mb-1">Kho tài liệu</h1>
                <p class="text-muted small mb-0">Miễn phí &amp; VIP — mua bằng ScholarHub Xu</p>
            </div>
            <div class="card border-0 shadow-sm mb-3">
                <div class="card-body">
                    <div class="row g-2 align-items-end">
                        <div class="col-lg-4">
                            <label class="form-label small fw-semibold">Từ khóa</label>
                            <input type="text" id="search-docs" class="form-control" placeholder="Tiêu đề, tag...">
                        </div>
                        <div class="col-6 col-lg-2">
                            <label class="form-label small fw-semibold">Môn học</label>
                            <select id="filter-mon" class="form-select"></select>
                        </div>
                        <div class="col-6 col-lg-2">
                            <label class="form-label small fw-semibold">Năm học</label>
                            <select id="filter-nam" class="form-select"></select>
                        </div>
                        <div class="col-6 col-lg-2">
                            <label class="form-label small fw-semibold">Loại</label>
                            <select id="filter-loai" class="form-select"></select>
                        </div>
                        <div class="col-6 col-lg-2">
                            <label class="form-label small fw-semibold">Sắp xếp</label>
                            <select id="sort-docs" class="form-select">
                                <option value="views">Lượt xem</option>
                                <option value="newest">Mới nhất</option>
                                <option value="rating">Đánh giá</option>
                            </select>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between mt-2">
                        <span class="text-muted small" id="result-count">0 kết quả</span>
                        <button type="button" id="btn-search-docs" class="btn btn-primary btn-sm">Lọc</button>
                    </div>
                </div>
            </div>
            <div id="docs-loader" class="row g-3 d-none"></div>
            <div id="docs-grid" class="row g-3"></div>
        </main>
        <aside id="app-rightbar" class="app-rightbar"></aside>
    </div>
    <div id="app-footer"></div>
    <div class="modal fade" id="docDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content" style="border-radius:16px">
                <div class="modal-header border-0"><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body pt-0" id="doc-detail-body"></div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/seed-data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/data-service.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/documents-page.js"></script>
</body>
</html>
