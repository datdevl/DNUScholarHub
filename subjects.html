<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Môn học — ScholarHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <link href="css/scholarhub.css" rel="stylesheet">
    <link rel="icon" href="logo.png" type="image/png">
</head>
<body data-page="subjects">
    <div id="app-header"></div>
    <div class="app-shell">
        <aside id="app-sidebar" class="app-sidebar"></aside>
        <main class="app-main">
            <h1 class="h5 fw-bold mb-3">Danh mục môn học</h1>
            <div id="subjects-page-loader" class="text-center py-4"><div class="spinner-border text-primary"></div></div>
            <div class="table-responsive card border-0 shadow-sm">
                <table class="table table-hover mb-0">
                    <thead class="table-light"><tr><th>Mã</th><th>Tên môn</th><th>Khoa</th><th>TC</th><th></th></tr></thead>
                    <tbody id="subjects-table-body"></tbody>
                </table>
            </div>
        </main>
        <aside id="app-rightbar" class="app-rightbar"></aside>
    </div>
    <div id="app-footer"></div>
    <script src="js/config.js"></script>
    <script src="js/seed-data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/data-service.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/subjects-page.js"></script>
    <script>document.addEventListener("DOMContentLoaded",function(){initLayout("subjects");});</script>
</body>
</html>
