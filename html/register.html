<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký — ScholarHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <link href="../css/scholarhub.css" rel="stylesheet">
    <link rel="icon" href="../logo.png" type="image/png">
</head>
<body class="bg-light">
    <div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
        <div class="card border-0 shadow col-md-5" style="border-radius:16px">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <a href="../index.html" class="site-brand site-brand--auth">
                        <img src="../logo.png" alt="ScholarHub" class="site-brand__img" width="240" height="64">
                    </a>
                    <p class="text-muted small mt-2" id="reg-subtitle">Tạo tài khoản miễn phí</p>
                </div>
                <form id="register-form">
                    <div class="mb-3">
                        <label class="form-label">Họ và tên *</label>
                        <input type="text" class="form-control" id="reg-name" required>
                        <div class="field-error" id="reg-name-error"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email *</label>
                        <input type="email" class="form-control" id="reg-email" required placeholder="tenban@dnu.edu.vn">
                        <div class="field-error" id="reg-email-error"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mật khẩu *</label>
                        <input type="password" class="form-control" id="reg-pass" required minlength="6" placeholder="Tối thiểu 6 ký tự">
                        <div class="field-error" id="reg-pass-error"></div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Trường học</label>
                        <input type="text" class="form-control" id="reg-school" value="Đại học Đại Nam">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 mb-2" id="btn-register">Đăng ký</button>
                    <a href="login.html" class="btn btn-link w-100">Đã có tài khoản? Đăng nhập</a>
                </form>
                <p class="small text-muted mt-3 mb-0 text-center">Tài khoản demo: <code>demo@dnu.edu.vn</code> / <code>123456</code></p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/seed-data.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/data-service.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/i18n.js"></script>
    <script>
        document.getElementById("reg-subtitle").innerHTML =
            "Tạo tài khoản — nhận <strong>" + SCHOLARHUB_CONFIG.NEW_USER_XU + " xu</strong> miễn phí";

        document.getElementById("register-form").addEventListener("submit", function (e) {
            e.preventDefault();
            const form = e.target;
            clearFieldErrors(form);
            const name = document.getElementById("reg-name").value.trim();
            const email = document.getElementById("reg-email").value.trim();
            const pass = document.getElementById("reg-pass").value;
            const school = document.getElementById("reg-school").value.trim();
            if (!name) { showFieldError("reg-name", "Nhập họ tên"); return; }
            if (!email) { showFieldError("reg-email", "Nhập email"); return; }
            if (pass.length < 6) { showFieldError("reg-pass", "Mật khẩu tối thiểu 6 ký tự"); return; }

            const btn = document.getElementById("btn-register");
            btn.disabled = true;
            btn.textContent = "Đang đăng ký...";

            registerUserData({
                ho_ten: name,
                email: email,
                mat_khau: pass,
                truong_hoc: school,
                anh_dai_dien: SCHOLARHUB_CONFIG.DEFAULT_AVATARS[Math.floor(Math.random() * 6)],
                so_xu: SCHOLARHUB_CONFIG.NEW_USER_XU,
                ten_dang_nhap: email.split("@")[0]
            })
                .then(function (user) {
                    loginWithApiUser(user, "student");
                    showToast("Đăng ký thành công! +" + SCHOLARHUB_CONFIG.NEW_USER_XU + " xu", "success");
                    setTimeout(function () { window.location.href = "../index.html"; }, 900);
                })
                .catch(function (err) {
                    if (err && err.message === "exists") {
                        showToast("Email đã được đăng ký", "error");
                    } else {
                        showToast("Đăng ký thất bại. Thử lại sau.", "error");
                    }
                })
                .finally(function () {
                    btn.disabled = false;
                    btn.textContent = "Đăng ký";
                });
        });
    </script>
</body>
</html>
