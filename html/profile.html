<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ — ScholarHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <link href="../css/scholarhub.css" rel="stylesheet">
    <link rel="icon" href="../logo.png" type="image/png">
</head>
<body data-page="profile">
    <div id="app-header"></div>
    <div class="profile-page">
        <div class="container">
            <ul class="nav profile-tabs mb-4" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-info" type="button">Thông tin cá nhân</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-wallet" type="button" id="tab-wallet-btn">Ví xu &amp; Nạp</button>
                </li>
            </ul>
            <div class="tab-content">
                <div class="tab-pane fade show active" id="tab-info">
                    <div class="row g-4">
                        <div class="col-lg-4">
                            <div class="profile-card avatar-upload-wrap">
                                <img id="profile-avatar-main" class="avatar-lg" src="" alt="Avatar">
                                <p class="small text-muted">Nhấn ảnh để tải lên, hoặc chọn mẫu bên dưới</p>
                                <input type="file" id="avatar-file-input" accept="image/*" class="d-none">
                                <div id="avatar-samples-grid" class="avatar-samples"></div>
                            </div>
                        </div>
                        <div class="col-lg-8">
                            <div class="profile-card">
                                <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-4">
                                    <div>
                                        <h1 class="h5 fw-bold mb-1">Thông tin cá nhân</h1>
                                        <p class="text-muted small mb-0">Cập nhật hồ sơ học tập của bạn</p>
                                    </div>
                                    <span class="coin-pill-profile"><i class="fa-solid fa-coins"></i> <span id="profile-xu-count">0</span> ScholarHub Xu</span>
                                </div>
                                <form id="profile-form">
                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <label class="form-label">Họ và tên</label>
                                            <input type="text" class="form-control" id="pf-ho-ten" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Số điện thoại</label>
                                            <input type="tel" class="form-control" id="pf-sdt">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Trường học</label>
                                            <input type="text" class="form-control" id="pf-truong" placeholder="VD: Đại học Đại Nam">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Tên đăng nhập</label>
                                            <input type="text" class="form-control" id="pf-username">
                                        </div>
                                        <div class="col-12">
                                            <label class="form-label">Email</label>
                                            <input type="email" class="form-control" id="pf-email" readonly>
                                        </div>
                                    </div>
                                    <div class="text-end mt-4">
                                        <button type="submit" class="btn btn-primary px-4">Lưu thay đổi</button>
                                        <button type="button" class="btn btn-outline-secondary ms-2" onclick="logoutUser()"><script>document.write(typeof t === "function" ? t("btn_logout") : "Đăng xuất");</script><noscript>Đăng xuất</noscript></button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="tab-pane fade" id="tab-wallet">
                    <div class="profile-card">
                        <h2 class="h5 fw-bold mb-3"><i class="fa-solid fa-coins text-warning me-2"></i>Nạp ScholarHub Xu</h2>
                        <p class="text-muted">Xu dùng để mua tài liệu VIP. Điểm tích lũy tăng khi đóng góp tài liệu.</p>
                        <div class="row g-3 mt-2">
                            <div class="col-md-4">
                                <button type="button" class="btn btn-outline-primary w-100 py-3" data-nap-xu="20">+20 Xu</button>
                            </div>
                            <div class="col-md-4">
                                <button type="button" class="btn btn-outline-primary w-100 py-3" data-nap-xu="50">+50 Xu</button>
                            </div>
                            <div class="col-md-4">
                                <button type="button" class="btn btn-accent w-100 py-3" data-nap-xu="100">+100 Xu</button>
                            </div>
                        </div>
                        <p class="small text-muted mt-3 mb-0">* Demo: nạp xu trực tiếp qua MockAPI (PUT user).</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="app-footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/seed-data.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/data-service.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/i18n.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/gemini-chat.js"></script>
    <script src="../js/profile.js"></script>
</body>
</html>
