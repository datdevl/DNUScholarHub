<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng tải — ScholarHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <link href="../css/scholarhub.css" rel="stylesheet">
    <link rel="icon" href="../logo.png" type="image/png">
</head>
<body data-page="upload">
    <div id="app-header"></div>
    <div class="app-shell">
        <aside id="app-sidebar" class="app-sidebar"></aside>
        <main class="app-main">
            <div class="page-header-bar rounded-3 mb-3 px-3 py-3 bg-white shadow-sm">
                <h1 class="h5 fw-bold mb-1">Đóng góp tài liệu</h1>
                <p class="text-muted small mb-0">Pending → Admin duyệt · Thưởng <strong>+10 xu</strong> khi đăng thành công</p>
            </div>
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form id="upload-form" novalidate>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tiêu đề *</label>
                            <input type="text" class="form-control" id="tieu_de" required>
                            <div class="field-error" id="tieu_de-error"></div>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Môn học *</label>
                                <select class="form-select" id="id_mon_hoc" required><option value="">Đang tải...</option></select>
                                <div class="field-error" id="id_mon_hoc-error"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Loại</label>
                                <select class="form-select" id="loai_tai_lieu">
                                    <option>Đề thi</option><option>Slide bài giảng</option><option>Ghi chép</option><option>Tài liệu tham khảo</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3 mt-3">
                            <label class="form-label fw-semibold">Người đăng *</label>
                            <input type="text" class="form-control" id="nguoi_dang">
                            <div class="field-error" id="nguoi_dang-error"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Link tải *</label>
                            <input type="url" class="form-control" id="duong_dan_file" placeholder="https://...">
                            <div class="field-error" id="duong_dan_file-error"></div>
                            <div class="form-text">Bạn có thể dán link tải, hoặc tải file PDF/Word từ máy.</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Hoặc tải file từ máy (PDF/DOC/DOCX)</label>
                            <input type="file" class="form-control" id="file_upload" accept=".pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
                            <div class="small text-muted mt-1" id="file-upload-name"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Ảnh bìa (URL)</label>
                            <input type="url" class="form-control" id="anh_bia">
                            <div class="field-error" id="anh_bia-error"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Mô tả</label>
                            <textarea class="form-control" id="mo_ta" rows="2"></textarea>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Năm học</label>
                                <input type="text" class="form-control" id="nam_hoc" value="2024-2025">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Từ khóa</label>
                                <input type="text" class="form-control" id="tu_khoa">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Đánh giá (1-5)</label>
                                <input type="number" class="form-control" id="diem_danh_gia" min="1" max="5" value="4">
                            </div>
                        </div>
                        <button type="submit" id="btn-submit-upload" class="btn btn-primary w-100 py-3 mt-4">
                            <i class="fa-solid fa-cloud-arrow-up me-2"></i>Gửi tài liệu
                        </button>
                    </form>
                </div>
            </div>
        </main>
        <aside id="app-rightbar" class="app-rightbar"></aside>
    </div>
    <div id="app-footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/seed-data.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/data-service.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/i18n.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/upload.js"></script>
</body>
</html>
