<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng xếp hạng — ScholarHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <link href="../css/scholarhub.css" rel="stylesheet">
    <link rel="icon" href="../logo.png" type="image/png">
</head>
<body data-page="leaderboard">
    <div id="app-header"></div>
    <div class="app-shell">
        <aside id="app-sidebar" class="app-sidebar"></aside>
        <main class="app-main">
            <div class="page-header-bar rounded-3 mb-3 px-3 py-3 bg-white shadow-sm">
                <h1 class="h5 fw-bold mb-1"><i class="fa-solid fa-trophy text-warning me-2"></i>Bảng xếp hạng</h1>
                <p class="text-muted small mb-0">Xếp hạng theo điểm tích lũy và xu</p>
            </div>
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <ul class="nav nav-pills mb-3" id="leaderboard-page-tabs">
                        <li class="nav-item"><button class="nav-link active" data-mode="week">Tuần</button></li>
                        <li class="nav-item"><button class="nav-link" data-mode="month">Tháng</button></li>
                    </ul>
                    <div id="leaderboard-page-list"></div>
                </div>
            </div>
        </main>
        <aside id="app-rightbar" class="app-rightbar"></aside>
    </div>
    <div id="app-footer"></div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/seed-data.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/data-service.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/i18n.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/gemini-chat.js"></script>
    <script src="../js/leaderboard-page.js"></script>
</body>
</html>
