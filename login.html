<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập — ScholarHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <link href="css/scholarhub.css" rel="stylesheet">
    <link rel="icon" href="logo.png" type="image/png">
</head>
<body style="background:var(--sh-bg)">
    <div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
        <div class="card border-0 shadow col-md-5" style="border-radius:16px">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <a href="index.html" class="site-brand site-brand--auth">
                        <img src="logo.png" alt="ScholarHub" class="site-brand__img" width="240" height="64">
                    </a>
                    <p class="text-muted small mt-2">Đăng nhập để mua tài liệu VIP &amp; quản lý xu</p>
                </div>
                <form id="login-form">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="login-email" required placeholder="demo@dnu.edu.vn">
                        <div class="field-error" id="login-email-error"></div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Mật khẩu</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="login-password" required placeholder="123456">
                            <button class="btn btn-outline-secondary" type="button" id="btn-hold-show-pass">
                                <i class="fa-regular fa-eye"></i>
                            </button>
                        </div>
                        <div class="field-error" id="login-password-error"></div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 mb-2" id="btn-login">Đăng nhập</button>
                    <a href="register.html" class="btn btn-outline-primary w-100 mb-2">Tạo tài khoản mới</a>
                    <a href="index.html" class="btn btn-link w-100">← Về trang chủ</a>
                </form>
                <div class="small text-muted mt-3 text-center">
                    <p class="mb-1"><strong>Demo SV:</strong> <code>demo@dnu.edu.vn</code> / <code>123456</code></p>
                    <p class="mb-0"><strong>Admin:</strong> <code>admin@scholarhub.vn</code> / <code>admin123</code></p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/seed-data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/data-service.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        ensureDemoLocalUsers();
        (function bindHoldShowPassword() {
            const passInput = document.getElementById("login-password");
            const holdBtn = document.getElementById("btn-hold-show-pass");
            if (!passInput || !holdBtn) return;
            const show = function () { passInput.type = "text"; };
            const hide = function () { passInput.type = "password"; };
            holdBtn.addEventListener("mousedown", show);
            holdBtn.addEventListener("touchstart", show);
            holdBtn.addEventListener("mouseup", hide);
            holdBtn.addEventListener("mouseleave", hide);
            holdBtn.addEventListener("touchend", hide);
            holdBtn.addEventListener("touchcancel", hide);
        })();

        document.getElementById("login-form").addEventListener("submit", function (e) {
            e.preventDefault();
            const email = document.getElementById("login-email").value.trim();
            const pass = document.getElementById("login-password").value;
            clearFieldErrors(document.getElementById("login-form"));
            if (!email) { showFieldError("login-email", "Nhập email"); return; }
            if (!pass) { showFieldError("login-password", "Nhập mật khẩu"); return; }

            const btn = document.getElementById("btn-login");
            btn.disabled = true;

            if (email === "admin@scholarhub.vn" && pass === "admin123") {
                setCurrentUser({
                    id: "admin",
                    ho_ten: "Quản trị viên",
                    email: email,
                    anh_dai_dien: SCHOLARHUB_CONFIG.DEFAULT_AVATARS[0],
                    so_xu: 9999,
                    role: "admin"
                });
                showToast("Đăng nhập admin!", "success");
                setTimeout(function () { window.location.href = "admin.html"; }, 700);
                return;
            }

            findUserByEmail(email)
                .then(function (user) {
                    if (!user) {
                        showToast("Email chưa đăng ký. Hãy đăng ký tài khoản mới.", "error");
                        btn.disabled = false;
                        return;
                    }
                    const storedPass = user.mat_khau || "";
                    if (storedPass && storedPass !== pass) {
                        showToast("Mật khẩu không đúng", "error");
                        btn.disabled = false;
                        return;
                    }
                    loginWithApiUser(user, "student");
                    showToast("Chào " + (user.ho_ten || "bạn") + "!", "success");
                    setTimeout(function () { window.location.href = "index.html"; }, 700);
                })
                .catch(function () {
                    showToast("Lỗi đăng nhập. Thử lại.", "error");
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
